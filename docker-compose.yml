version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: integrame-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: integrame
      MYSQL_USER: integrame
      MYSQL_PASSWORD: integrame123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: integrame-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://integrame:integrame123@mysql:3306/integrame
      JWT_SECRET: super-secret-jwt-change-in-production
      JWT_EXPIRES_IN: 7d
      OTP_EXPIRES_MINUTES: 10
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      NODE_ENV: production
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: integrame-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  mysql-data:
